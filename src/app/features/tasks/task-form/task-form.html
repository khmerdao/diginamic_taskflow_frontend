<div class="d-flex align-items-center justify-content-between mb-3">
  <div>
    <h1 class="h4 mb-0">{{ taskId() ? 'Éditer la tâche' : 'Nouvelle tâche' }}</h1>
    <div class="text-muted">Renseigne les informations principales</div>
  </div>

  <a class="btn btn-outline-secondary" routerLink="/tasks">Retour</a>
</div>

<div class="card shadow-sm">
  <div class="card-body p-4">
    @if (errorMessage()) {
      <div class="alert alert-danger">{{ errorMessage() }}</div>
    }

    @if (loading()) {
      <div class="d-flex align-items-center gap-2 mb-3">
        <div class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></div>
        <span class="text-muted">Chargement…</span>
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="row g-3">
      <div class="col-12">
        <label class="form-label">Titre</label>
        <input class="form-control" formControlName="title" placeholder="Ex: Préparer la présentation" />
        @if (form.controls.title.touched && form.controls.title.invalid) {
          <div class="invalid-feedback d-block">Le titre est requis.</div>
        }
      </div>

      <div class="col-12">
        <label class="form-label">Description</label>
        <textarea class="form-control" rows="4" formControlName="description"></textarea>
      </div>

      <div class="col-12 col-md-4">
        <label class="form-label">Statut</label>
        <select class="form-select" formControlName="status">
          @for (s of statuses; track s) {
            <option [value]="s">{{ s }}</option>
          }
        </select>
      </div>

      <div class="col-12 col-md-4">
        <label class="form-label">Priorité</label>
        <select class="form-select" formControlName="priority">
          @for (p of priorities; track p) {
            <option [value]="p">{{ p }}</option>
          }
        </select>
      </div>

      <div class="col-12 col-md-4">
        <label class="form-label">Échéance</label>
        <input class="form-control" type="date" formControlName="due_date" />
      </div>

      <div class="col-12 col-md-6">
        <label class="form-label">Catégorie</label>
        <select class="form-select" formControlName="category">
          <option [ngValue]="null">Aucune</option>
          @for (c of categories(); track c.id) {
            <option [ngValue]="c.id">{{ c.name }}</option>
          }
        </select>
      </div>

      <div class="col-12 d-flex gap-2 justify-content-end mt-2">
        <a class="btn btn-outline-secondary" routerLink="/tasks">Annuler</a>
        <button class="btn btn-primary" type="submit" [disabled]="saving() || form.invalid">
          @if (saving()) {
            <span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
          }
          Enregistrer
        </button>
      </div>
    </form>
  </div>
</div>
